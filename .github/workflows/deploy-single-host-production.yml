name: Deploy Single Host Production

on:
  workflow_call:
    inputs:
      git_ref:
        required: false
        type: string
      deploy_mode:
        required: false
        default: image
        type: string
      release_manifest:
        required: false
        type: string
      promotion_run_id:
        required: false
        type: string
      release_id:
        required: false
        type: string
      release_source_sha:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy in build mode.
        required: false
        type: string
      deploy_mode:
        description: Deploy from source checkout or pinned GHCR images.
        required: true
        default: image
        type: choice
        options:
          - build
          - image
      release_manifest:
        description: Required multi-line env manifest for image mode.
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-single-host-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve deploy configuration
        env:
          INPUT_GIT_REF: ${{ inputs.git_ref || github.event.inputs.git_ref }}
          INPUT_DEPLOY_MODE: ${{ inputs.deploy_mode || github.event.inputs.deploy_mode }}
          INPUT_RELEASE_MANIFEST: ${{ inputs.release_manifest || github.event.inputs.release_manifest }}
          INPUT_PROMOTION_RUN_ID: ${{ inputs.promotion_run_id }}
          INPUT_RELEASE_ID: ${{ inputs.release_id }}
          INPUT_RELEASE_SOURCE_SHA: ${{ inputs.release_source_sha }}
        run: |
          set -euo pipefail
          echo "DEPLOY_REF=${INPUT_GIT_REF:-}" >> "$GITHUB_ENV"
          echo "DEPLOY_MODE=${INPUT_DEPLOY_MODE:-image}" >> "$GITHUB_ENV"
          printf 'RELEASE_MANIFEST<<EOF\n%s\nEOF\n' "${INPUT_RELEASE_MANIFEST:-}" >> "$GITHUB_ENV"
          echo "DEPLOY_PROMOTION_RUN_ID=${INPUT_PROMOTION_RUN_ID:-$GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "DEPLOY_RELEASE_ID=${INPUT_RELEASE_ID:-}" >> "$GITHUB_ENV"
          echo "DEPLOY_RELEASE_SOURCE_SHA=${INPUT_RELEASE_SOURCE_SHA:-$GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Validate production deployment configuration
        env:
          SSH_HOST: ${{ vars.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
          SSH_KNOWN_HOSTS: ${{ vars.PRODUCTION_SSH_KNOWN_HOSTS }}
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
          ENV_FILE: ${{ vars.PRODUCTION_ENV_FILE }}
          API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          ADMIN_USER: ${{ secrets.PRODUCTION_ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}
          GHCR_USERNAME: ${{ vars.PRODUCTION_GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.PRODUCTION_GHCR_TOKEN }}
        run: |
          set -euo pipefail
          for value_name in SSH_HOST SSH_USER SSH_KNOWN_HOSTS DEPLOY_PATH ENV_FILE API_BASE_URL SSH_PRIVATE_KEY ADMIN_USER ADMIN_PASSWORD; do
            value="${!value_name:-}"
            if [ -z "$value" ]; then
              echo "missing required production deployment setting: $value_name" >&2
              exit 1
            fi
          done
          if [ "$DEPLOY_MODE" = "image" ]; then
            for value_name in RELEASE_MANIFEST GHCR_USERNAME GHCR_TOKEN; do
              value="${!value_name:-}"
              if [ -z "$value" ]; then
                echo "missing required image-mode production setting: $value_name" >&2
                exit 1
              fi
            done
          fi
          if [ "$DEPLOY_MODE" = "build" ] && [ -z "$DEPLOY_REF" ]; then
            echo "git_ref is required when deploy_mode=build" >&2
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Write pinned known_hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ vars.PRODUCTION_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Prepare release manifest
        if: env.DEPLOY_MODE == 'image'
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/deploy-manifests/production
          printf '%s\n' "$RELEASE_MANIFEST" > ./artifacts/deploy-manifests/production/release-manifest.env
          echo "RELEASE_MANIFEST_SHA256=$(sha256sum ./artifacts/deploy-manifests/production/release-manifest.env | awk '{print $1}')" >> "$GITHUB_ENV"
          manifest_release_id="$(awk -F= '$1 == "RELEASE_ID" { print substr($0, index($0, "=") + 1) }' ./artifacts/deploy-manifests/production/release-manifest.env || true)"
          manifest_release_sha="$(awk -F= '$1 == "RELEASE_SOURCE_SHA" { print substr($0, index($0, "=") + 1) }' ./artifacts/deploy-manifests/production/release-manifest.env || true)"
          if [ -n "$manifest_release_id" ] && [ -z "${DEPLOY_RELEASE_ID:-}" ]; then
            echo "DEPLOY_RELEASE_ID=$manifest_release_id" >> "$GITHUB_ENV"
          fi
          if [ -n "$manifest_release_sha" ] && [ -z "${DEPLOY_RELEASE_SOURCE_SHA:-}" ]; then
            echo "DEPLOY_RELEASE_SOURCE_SHA=$manifest_release_sha" >> "$GITHUB_ENV"
          fi

      - name: Upload release manifest to production host
        if: env.DEPLOY_MODE == 'image'
        env:
          SSH_HOST: ${{ vars.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH/artifacts/deploy-manifests/production'"
          scp ./artifacts/deploy-manifests/production/release-manifest.env "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/artifacts/deploy-manifests/production/release-manifest-${{ github.run_id }}.env"
          echo "REMOTE_RELEASE_MANIFEST=$DEPLOY_PATH/artifacts/deploy-manifests/production/release-manifest-${{ github.run_id }}.env" >> "$GITHUB_ENV"

      - name: Deploy production stack
        env:
          SSH_HOST: ${{ vars.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
          ENV_FILE: ${{ vars.PRODUCTION_ENV_FILE }}
          API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
          ADMIN_USER: ${{ secrets.PRODUCTION_ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}
          GHCR_USERNAME: ${{ vars.PRODUCTION_GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.PRODUCTION_GHCR_TOKEN }}
        run: |
          set -euo pipefail
          ssh "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          cd "$DEPLOY_PATH"
          mkdir -p "$DEPLOY_PATH/artifacts/deploy-reports/production" "$DEPLOY_PATH/artifacts/release-catalog/production" "$DEPLOY_PATH/artifacts/release-ledgers/production"
          if [ "$DEPLOY_MODE" = "image" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            set -a
            . "$REMOTE_RELEASE_MANIFEST"
            set +a
            RELEASE_MANIFEST_PATH="$REMOTE_RELEASE_MANIFEST" \
            RELEASE_MANIFEST_SHA256="$RELEASE_MANIFEST_SHA256" \
            DEPLOY_PROMOTION_RUN_ID="$DEPLOY_PROMOTION_RUN_ID" \
            DEPLOY_RELEASE_ID="$DEPLOY_RELEASE_ID" \
            DEPLOY_RELEASE_SOURCE_SHA="$DEPLOY_RELEASE_SOURCE_SHA" \
            DEPLOY_MODE=image \
            DEPLOY_API_BASE_URL="$API_BASE_URL" \
            DEPLOY_ADMIN_USER="$ADMIN_USER" \
            DEPLOY_ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            DEPLOY_REPORT_DIR="$DEPLOY_PATH/artifacts/deploy-reports/production" \
            ./scripts/deploy-single-host.sh up "$ENV_FILE"
            release_selector="$REMOTE_RELEASE_MANIFEST"
            if [ -n "${DEPLOY_RELEASE_ID:-}" ]; then
              release_selector="$DEPLOY_RELEASE_ID"
            fi
            ./scripts/release-catalog.sh sync-manifest "$DEPLOY_PATH/artifacts/release-catalog/production/catalog.json" production "$REMOTE_RELEASE_MANIFEST" "$RELEASE_MANIFEST_SHA256"
            ./scripts/release-catalog.sh record-operation "$DEPLOY_PATH/artifacts/release-catalog/production/catalog.json" production "$release_selector" deploy "$DEPLOY_PATH/artifacts/deploy-reports/production"
            ./scripts/release-catalog.sh export-ledger "$DEPLOY_PATH/artifacts/release-catalog/production/catalog.json" "$release_selector" "$DEPLOY_PATH/artifacts/release-ledgers/production/release-ledger-${DEPLOY_RELEASE_ID:-latest}.json"
          else
            git fetch --all --tags --prune
            git checkout "$DEPLOY_REF"
            DEPLOY_PROMOTION_RUN_ID="$DEPLOY_PROMOTION_RUN_ID" \
            DEPLOY_RELEASE_ID="$DEPLOY_RELEASE_ID" \
            DEPLOY_RELEASE_SOURCE_SHA="$DEPLOY_RELEASE_SOURCE_SHA" \
            DEPLOY_MODE=build \
            DEPLOY_API_BASE_URL="$API_BASE_URL" \
            DEPLOY_ADMIN_USER="$ADMIN_USER" \
            DEPLOY_ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            DEPLOY_REPORT_DIR="$DEPLOY_PATH/artifacts/deploy-reports/production" \
            ./scripts/deploy-single-host.sh up "$ENV_FILE"
          fi
          EOF

      - name: Download production deploy artifacts
        if: always()
        env:
          SSH_HOST: ${{ vars.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ vars.PRODUCTION_SSH_USER }}
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/deploy-reports/production ./artifacts/deploy-manifests/production ./artifacts/release-catalog/production ./artifacts/release-ledgers/production
          scp -r "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/artifacts/deploy-reports/production/." ./artifacts/deploy-reports/production/ || true
          scp -r "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/artifacts/deploy-manifests/production/." ./artifacts/deploy-manifests/production/ || true
          scp -r "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/artifacts/release-catalog/production/." ./artifacts/release-catalog/production/ || true
          scp -r "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/artifacts/release-ledgers/production/." ./artifacts/release-ledgers/production/ || true

      - name: Attest production release ledgers
        if: always()
        env:
          LEDGER_ATTESTATION_SIGNING_KEY: ${{ secrets.RELEASE_LEDGER_ATTESTATION_KEY }}
          LEDGER_ATTESTATION_KEY_ID: ${{ vars.RELEASE_LEDGER_ATTESTATION_KEY_ID }}
          LEDGER_ATTESTATION_REQUIRE_SIGNED: ${{ vars.RELEASE_LEDGER_ATTESTATION_REQUIRED || 'false' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p ./artifacts/release-ledgers/production
          for ledger in ./artifacts/release-ledgers/production/release-ledger-*.json; do
            case "$ledger" in
              *.attestation.json) continue ;;
            esac
            ./scripts/attest-release-ledger.sh "$ledger" "${ledger%.json}.attestation.json"
            ./scripts/verify-release-ledger-attestation.sh "$ledger" "${ledger%.json}.attestation.json"
          done

      - name: Build production release evidence summary
        if: always() && env.DEPLOY_MODE == 'image'
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/release-evidence/production
          ./scripts/collect-release-evidence.sh \
            production \
            ./artifacts/release-catalog/production/catalog.json \
            ./artifacts/release-ledgers/production \
            ./artifacts/release-evidence/production

      - name: Export production release evidence to audit target
        if: always() && env.DEPLOY_MODE == 'image' && vars.RELEASE_EVIDENCE_AUDIT_TARGET != ''
        env:
          RELEASE_EVIDENCE_AUDIT_TARGET: ${{ vars.RELEASE_EVIDENCE_AUDIT_TARGET }}
          RELEASE_EVIDENCE_AWS_REGION: ${{ vars.RELEASE_EVIDENCE_AWS_REGION }}
          RELEASE_EVIDENCE_AWS_ENDPOINT_URL: ${{ vars.RELEASE_EVIDENCE_AWS_ENDPOINT_URL }}
        run: |
          set -euo pipefail
          ./scripts/export-release-evidence.sh \
            production \
            ./artifacts/release-catalog/production \
            ./artifacts/release-ledgers/production \
            ./artifacts/release-evidence/production \
            "$RELEASE_EVIDENCE_AUDIT_TARGET"

      - name: Verify production evidence artifacts
        if: always()
        run: |
          set -euo pipefail
          archive_manifest="$(find ./artifacts/deploy-reports/production -name 'archive-manifest-*.txt' -print -quit)"
          deploy_manifest="$(find ./artifacts/deploy-reports/production -name 'deploy-manifest-*.txt' -print -quit)"
          if [ -z "$archive_manifest" ] || [ -z "$deploy_manifest" ]; then
            echo "required production evidence artifacts are missing" >&2
            exit 1
          fi
          if [ "$DEPLOY_MODE" = "image" ]; then
            test -f ./artifacts/release-catalog/production/catalog.json || {
              echo "production release catalog is missing" >&2
              exit 1
            }
            test -n "$(find ./artifacts/release-ledgers/production -name 'release-ledger-*.json' -print -quit)" || {
              echo "production release ledger is missing" >&2
              exit 1
            }
            test -f ./artifacts/release-evidence/production/release-evidence-summary.json || {
              echo "production release evidence summary is missing" >&2
              exit 1
            }
            grep -F "release_manifest_sha256=$RELEASE_MANIFEST_SHA256" "$deploy_manifest" >/dev/null 2>&1 || {
              echo "deploy manifest does not record release manifest sha" >&2
              exit 1
            }
          fi

      - name: Upload production deploy artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-deploy-reports
          path: |
            artifacts/deploy-reports/production
            artifacts/deploy-manifests/production
            artifacts/release-catalog/production
            artifacts/release-ledgers/production
            artifacts/release-evidence/production
          if-no-files-found: warn

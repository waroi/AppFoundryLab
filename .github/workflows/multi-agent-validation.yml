name: Multi-Agent Markdown Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate-markdown-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Required Rule Files Exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "AGENTS.md"
            "README.md"
            "multi_agent/config.md"
            "multi_agent/instructions/orchestration.md"
            "multi_agent/instructions/operator-playbook.md"
            "multi_agent/instructions/handoff-format.md"
            "multi_agent/instructions/token-optimization.md"
            "multi_agent/tools/README.md"
            "multi_agent/tools/dispatch.rule.md"
            "multi_agent/tools/generate-brief.rule.md"
            "multi_agent/tools/summarize-handoffs.rule.md"
            "multi_agent/tools/detect-conflicts.rule.md"
            "multi_agent/tools/orchestrate-run.rule.md"
            "multi_agent/tools/cleanup-runtime.rule.md"
            "multi_agent/tools/run-unit-tests.rule.md"
            "multi_agent/tools/validate-setup.rule.md"
            "multi_agent/tools/lib/routing-engine.rule.md"
            "multi_agent/tools/lib/safety.rule.md"
            "multi_agent/tools/lib/telemetry.rule.md"
            "multi_agent/tests/orchestration-regression.md"
            "skills/multi-agent-orchestrator/SKILL.md"
          )
          for f in "${required[@]}"; do
            test -f "$f" || { echo "Missing required file: $f"; exit 1; }
          done

      - name: Ensure No Active PowerShell Tooling Remains
        shell: bash
        run: |
          set -euo pipefail
          if find multi_agent -type f \( -name "*.ps1" -o -name "*.psm1" \) ! -path "multi_agent/runtime/*" | grep -q .; then
            echo "PowerShell scripts detected in multi_agent/ outside runtime history."
            find multi_agent -type f \( -name "*.ps1" -o -name "*.psm1" \) ! -path "multi_agent/runtime/*"
            exit 1
          fi

      - name: Ensure Script References Are Removed From Active Docs
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE "\.ps1|config\.json" AGENTS.md README.md multi_agent/instructions multi_agent/tools skills; then
            echo "Active docs still reference removed script/config paths."
            exit 1
          fi

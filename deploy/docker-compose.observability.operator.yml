services:
  prometheus-operator-proxy:
    image: ${PROMETHEUS_OPERATOR_PROXY_IMAGE:-caddy:2.8.4-alpine}
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      PROMETHEUS_OPERATOR_USERNAME: ${PROMETHEUS_OPERATOR_USERNAME}
      PROMETHEUS_OPERATOR_PASSWORD_HASH: ${PROMETHEUS_OPERATOR_PASSWORD_HASH}
    volumes:
      - ./deploy/observability/Caddyfile.prometheus-operator:/etc/caddy/Caddyfile:ro
    ports:
      - "${PROMETHEUS_OPERATOR_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_OPERATOR_PORT:-9443}:9443"
    networks:
      - backend_internal

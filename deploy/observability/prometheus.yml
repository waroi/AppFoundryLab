# Single-host baseline: keep the Prometheus UI/API host-local on `127.0.0.1:9090`.
# This file only defines private backend scrapes.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: logger
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - logger:8090

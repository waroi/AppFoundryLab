<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AppFoundryLab Architecture</title>
  <desc id="desc">Frontend, API gateway, logger, worker, databases and CI relationships.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ec; }
      .line { stroke: #2b3440; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .node { fill: #fffdf8; stroke: #2b3440; stroke-width: 3; rx: 18; ry: 18; }
      .infra { fill: #e3efe7; }
      .svc { fill: #fef2d6; }
      .ci { fill: #dfe8f6; }
      .label { font: 600 24px Arial, sans-serif; fill: #1c232b; }
      .small { font: 500 18px Arial, sans-serif; fill: #42505c; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2b3440"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="720"/>

  <rect class="node svc" x="70" y="120" width="220" height="110"/>
  <text class="label" x="180" y="165" text-anchor="middle">Frontend</text>
  <text class="small" x="180" y="198" text-anchor="middle">Astro + Svelte</text>

  <rect class="node svc" x="360" y="120" width="250" height="110"/>
  <text class="label" x="485" y="165" text-anchor="middle">API Gateway</text>
  <text class="small" x="485" y="198" text-anchor="middle">Go + chi + JWT + RBAC</text>

  <rect class="node svc" x="700" y="70" width="220" height="100"/>
  <text class="label" x="810" y="112" text-anchor="middle">Logger</text>
  <text class="small" x="810" y="143" text-anchor="middle">Go queue ingest</text>

  <rect class="node svc" x="700" y="200" width="220" height="100"/>
  <text class="label" x="810" y="242" text-anchor="middle">Worker</text>
  <text class="small" x="810" y="273" text-anchor="middle">Rust gRPC</text>

  <rect class="node infra" x="980" y="40" width="150" height="90"/>
  <text class="label" x="1055" y="78" text-anchor="middle">MongoDB</text>

  <rect class="node infra" x="980" y="170" width="150" height="90"/>
  <text class="label" x="1055" y="208" text-anchor="middle">Redis</text>

  <rect class="node infra" x="980" y="300" width="150" height="90"/>
  <text class="label" x="1055" y="338" text-anchor="middle">PostgreSQL</text>

  <rect class="node ci" x="360" y="470" width="330" height="140"/>
  <text class="label" x="525" y="518" text-anchor="middle">GitHub Actions</text>
  <text class="small" x="525" y="552" text-anchor="middle">CI, release gates, perf, SBOM</text>
  <text class="small" x="525" y="582" text-anchor="middle">doc drift, security scans</text>

  <path class="line" d="M290 175 H360"/>
  <path class="line" d="M610 160 H700"/>
  <path class="line" d="M610 210 H700"/>
  <path class="line" d="M920 120 H980"/>
  <path class="line" d="M610 190 C760 190, 820 210, 980 215"/>
  <path class="line" d="M610 220 C760 260, 820 330, 980 345"/>
  <path class="line" d="M525 470 V230"/>
  <path class="line" d="M610 520 C760 500, 860 430, 1020 390"/>
  <path class="line" d="M440 470 C400 380, 400 310, 430 230"/>
  <path class="line" d="M610 500 C740 470, 760 360, 790 300"/>

  <text class="small" x="305" y="160">HTTP</text>
  <text class="small" x="630" y="145">HTTP ingest</text>
  <text class="small" x="635" y="235">gRPC</text>
</svg>

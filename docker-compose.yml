name: appfoundrylab

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_INITDB_ROOT_USERNAME}", "-p", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin"]
      interval: 15s
      timeout: 10s
      retries: 5

  logger:
    build:
      context: ./backend
      dockerfile: services/logger/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${LOGGER_HOST_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8090/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  calculator:
    build:
      context: ./backend
      dockerfile: core/calculator/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${CALCULATOR_HOST_PORT:-7070}:7070"

  api-gateway:
    build:
      context: ./backend
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      logger:
        condition: service_healthy
      calculator:
        condition: service_started
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${API_GATEWAY_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${DOCKER_HOST_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_HOST_PORT:-4321}:4321"

volumes:
  postgres_data:
  redis_data:
  mongo_data:
